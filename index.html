<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bridge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  
  <style>
    @font-face {
      font-family: 'Dialogue';
      src: url('./fonts/Dialogue-A-Medium-TRIAL.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Syncro';
      src: url('./fonts/SyncroTrial-Book.otf') format('opentype');
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Dialogue', serif;
    }

    svg text {
      font-family: 'Dialogue', serif;
    }
  </style>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .stage-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .svg-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* MAIN: 랜딩 영향 안 받게 */
    #main-stage {
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      will-change: opacity;
      isolation: isolate;
    }

    /* LANDING 전용 래퍼: 여기 안에서만 blend/opacity 처리 */
    #landing-stage {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      isolation: isolate;
      will-change: opacity;
    }

    #landing-card {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
      opacity: 1;
      border-radius: 0px;
      will-change: left, top, width, height, opacity, border-radius;
      transform: translateZ(0);
      background: transparent;
    }

    #landing-card-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #landing-card-svg svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    #landing-card-sheen {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0.00) 0%,
        rgba(255,255,255,0.02) 47%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.02) 53%,
        rgba(255,255,255,0.00) 100%
      );
      mix-blend-mode: screen;
      opacity: 0.16;
      will-change: opacity;
    }

    .cover {
      position: absolute;
      display: block;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      object-fit: fill;
    }

    /* 처음엔 검정, 스크롤 시작하면 흰색으로 바뀌게 */
    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 20;
      color: #000000;
      opacity: 1;
      font-size: 12px;
      letter-spacing: 0.08em;
      pointer-events: none;
      transition: color 0.35s ease, opacity 0.25s ease;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- MAIN -->
    <div id="main-stage" class="stage-layer">
      <div id="main-svg-wrap" class="svg-wrap stage-layer"></div>
      <div id="cover-wrap" class="stage-layer"></div>
    </div>

    <!-- LANDING -->
    <div id="landing-stage">
      <div id="landing-card">
        <div id="landing-card-svg"></div>
        <div id="landing-card-sheen"></div>
      </div>
    </div>
  </div>

  <div id="hint">SCROLL</div>

  <script>
    const LANDING_CARD_SRC = "web03.svg";
    const MAIN_SVG_SRC = "web02.svg";

    const COVER1_SRC = "cover1.png";
    const COVER2_SRC = "cover2.png";

    const MAIN_VIEW_W = 1920;
    const MAIN_VIEW_H = 1086.2646;

    const CARD_VIEW_W = 593.1724;
    const CARD_VIEW_H = 827.9505;
    const CARD_RATIO = CARD_VIEW_W / CARD_VIEW_H;

    let svgRoot;
    let mode = 1;

    let bgw, bgb, text1, text2, mouseLayer, shadow;
    let cover1Placeholder, cover2Placeholder;
    let bridgeText, unquotedText;

    let coverWrap;
    let cover1Dom, cover2Dom;

    let fitScale = 1;
    let fitX = 0;
    let fitY = 0;

    let coverRect = {
      x: 664.3654,
      y: 127.2975,
      w: 588.1724,
      h: 825.4051
    };

    let mouseBaseX = 0;
    let mouseBaseY = 0;
    let mouseCenterLocalX = 0;

    let introProgress = 0;
    let introTargetProgress = 0;
    let revealUnlocked = false;
    let introFinished = false;
    let hasScrolled = false;

    const mainStage = document.getElementById("main-stage");
    const mainSvgWrap = document.getElementById("main-svg-wrap");
    const coverWrapEl = document.getElementById("cover-wrap");

    const landingStage = document.getElementById("landing-stage");
    const landingCard = document.getElementById("landing-card");
    const landingCardSvg = document.getElementById("landing-card-svg");
    const landingCardSheen = document.getElementById("landing-card-sheen");

    const hint = document.getElementById("hint");

    function setup() {
      noCanvas();

      coverWrap = coverWrapEl;

      loadLandingCardSVG();
      loadMainSVG();

      applyUnifiedFit();
      updateIntroAnimation();

      window.addEventListener("resize", onResize, { passive: true });
      window.addEventListener("wheel", onWheel, { passive: false });
      window.addEventListener("keydown", onKeyDown);
    }

    function draw() {
      if (!introFinished) {
        introProgress = lerp(introProgress, introTargetProgress, 0.06);

        if (Math.abs(introProgress - introTargetProgress) < 0.0005) {
          introProgress = introTargetProgress;
        }

        updateIntroAnimation();
      }

      updateMouseFollow();
    }

    async function loadLandingCardSVG() {
      try {
        const res = await fetch(LANDING_CARD_SRC);
        const text = await res.text();
        landingCardSvg.innerHTML = text;

        const svg = landingCardSvg.querySelector("svg");
        if (svg) {
          svg.setAttribute("preserveAspectRatio", "none");
        }
      } catch (e) {
        console.error("Landing card SVG load failed:", e);
      }
    }

    async function loadMainSVG() {
      try {
        const res = await fetch(MAIN_SVG_SRC);
        const svgText = await res.text();

        mainSvgWrap.innerHTML = svgText;
        svgRoot = mainSvgWrap.querySelector("svg");

        if (!svgRoot) {
          console.error("Main SVG not found");
          return;
        }

        svgRoot.setAttribute("preserveAspectRatio", "xMidYMid slice");
        
        svgRoot.querySelectorAll("text").forEach(t => {
          t.style.fontFamily = "'Dialogue', serif";
        });

        bindMainElements();
        detectCoverRect();
        detectMouseGeometry();
        buildCoverImages();
        applyUnifiedFit();
        applyMode(1);
      } catch (err) {
        console.error("Main SVG load failed:", err);
      }
    }

    function bindMainElements() {
      bgw = svgRoot.getElementById("bgw");
      bgb = svgRoot.getElementById("bgb");
      text1 = svgRoot.getElementById("text1");
      text2 = svgRoot.getElementById("text2");
      mouseLayer = svgRoot.getElementById("mouse");
      shadow = svgRoot.getElementById("shadow");
      cover1Placeholder = svgRoot.getElementById("cover1");
      cover2Placeholder = svgRoot.getElementById("cover2");

      if (mouseLayer) {
        mouseLayer.style.mixBlendMode = "screen";
        mouseLayer.style.pointerEvents = "none";
      }

      const allTexts = [...svgRoot.querySelectorAll("text")];

      bridgeText = allTexts.find(t => {
        const txt = (t.textContent || "").trim().toLowerCase();
        return txt.includes("the bridge");
      });

      unquotedText = allTexts.find(t => {
        const txt = (t.textContent || "").trim().toLowerCase();
        return txt.includes("unquoted");
      });

      if (cover1Placeholder) cover1Placeholder.style.display = "none";
      if (cover2Placeholder) cover2Placeholder.style.display = "none";
    }

    function detectCoverRect() {
      let rectNode = null;

      if (cover1Placeholder) rectNode = cover1Placeholder.querySelector("rect");
      if (!rectNode && cover2Placeholder) rectNode = cover2Placeholder.querySelector("rect");

      if (rectNode) {
        coverRect.x = parseFloat(rectNode.getAttribute("x")) || coverRect.x;
        coverRect.y = parseFloat(rectNode.getAttribute("y")) || coverRect.y;
        coverRect.w = parseFloat(rectNode.getAttribute("width")) || coverRect.w;
        coverRect.h = parseFloat(rectNode.getAttribute("height")) || coverRect.h;
      }
    }

    function detectMouseGeometry() {
      if (!mouseLayer) return;

      const img = mouseLayer.querySelector("image");
      if (!img) return;

      const tr = img.getAttribute("transform");
      if (tr) {
        const match = tr.match(/translate\(([-\d.]+)\s+([-\d.]+)\)/);
        if (match) {
          mouseBaseX = parseFloat(match[1]) || 0;
          mouseBaseY = parseFloat(match[2]) || 0;
        }
      }

      const imgW = parseFloat(img.getAttribute("width")) || 0;
      mouseCenterLocalX = mouseBaseX + imgW * 0.5;

      mouseLayer.setAttribute("transform", `translate(${mouseBaseX} ${mouseBaseY})`);
    }

    function buildCoverImages() {
      coverWrap.innerHTML = "";

      cover1Dom = document.createElement("img");
      cover1Dom.src = COVER1_SRC;
      cover1Dom.className = "cover";
      cover1Dom.id = "cover1-dom";
      cover1Dom.alt = "cover1";
      cover1Dom.addEventListener("click", () => {
        if (!revealUnlocked) return;
        if (mode === 1) applyMode(2);
      });

      cover2Dom = document.createElement("img");
      cover2Dom.src = COVER2_SRC;
      cover2Dom.className = "cover";
      cover2Dom.id = "cover2-dom";
      cover2Dom.alt = "cover2";
      cover2Dom.addEventListener("click", () => {
        if (!revealUnlocked) return;
        if (mode === 2) applyMode(1);
      });

      coverWrap.appendChild(cover1Dom);
      coverWrap.appendChild(cover2Dom);
    }

    function applyUnifiedFit() {
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      fitScale = Math.max(sw / MAIN_VIEW_W, sh / MAIN_VIEW_H);
      fitX = (sw - MAIN_VIEW_W * fitScale) * 0.5;
      fitY = (sh - MAIN_VIEW_H * fitScale) * 0.5;

      positionCover(cover1Dom);
      positionCover(cover2Dom);
    }

    function positionCover(el) {
      if (!el) return;

      el.style.left = `${fitX + coverRect.x * fitScale}px`;
      el.style.top = `${fitY + coverRect.y * fitScale}px`;
      el.style.width = `${coverRect.w * fitScale}px`;
      el.style.height = `${coverRect.h * fitScale}px`;
    }

    function getTargetCardRect() {
      const coverCenterX = fitX + (coverRect.x + coverRect.w * 0.5) * fitScale;
      const coverCenterY = fitY + (coverRect.y + coverRect.h * 0.5) * fitScale;

      const coverWpx = coverRect.w * fitScale;
      const coverHpx = coverRect.h * fitScale;
      const coverRatio = coverWpx / coverHpx;

      let finalW, finalH;
      if (coverRatio > CARD_RATIO) {
        finalH = coverHpx;
        finalW = finalH * CARD_RATIO;
      } else {
        finalW = coverWpx;
        finalH = finalW / CARD_RATIO;
      }

      return {
        x: coverCenterX - finalW * 0.5,
        y: coverCenterY - finalH * 0.5,
        w: finalW,
        h: finalH
      };
    }

    function activateHint() {
      if (hasScrolled) return;
      hasScrolled = true;
      hint.style.color = "rgba(255,255,255,0.72)";
      hint.style.opacity = "1";
    }

    function onWheel(e) {
      if (introFinished) return;

      activateHint();
      e.preventDefault();

      const raw = e.deltaY;
      const limited = Math.sign(raw) * Math.min(Math.abs(raw), 12);
      const step = limited * 0.00105;

      introTargetProgress = clamp(introTargetProgress + step, 0, 1);
    }

    function onKeyDown(e) {
      if (introFinished) return;

      if (e.key === "ArrowDown" || e.key === "PageDown" || e.key === " ") {
        activateHint();
        e.preventDefault();
        introTargetProgress = clamp(introTargetProgress + 0.035, 0, 1);
      }

      if (e.key === "ArrowUp" || e.key === "PageUp") {
        activateHint();
        e.preventDefault();
        introTargetProgress = clamp(introTargetProgress - 0.035, 0, 1);
      }
    }

    function updateIntroAnimation() {
      const t = easeInOutCubic(introProgress);

      // 카드 이동은 대부분 구간에서 진행
      const cardPhase = clamp(t / 0.88, 0, 1);

      // 메인은 아주 마지막에만 등장
      const mainPhase = clamp((t - 0.90) / 0.10, 0, 1);

      // 카드 사라지는 것도 마지막
      const endFade = clamp((t - 0.94) / 0.06, 0, 1);

      const startX = 0;
      const startY = 0;
      const startW = window.innerWidth;
      const startH = window.innerHeight;

      const target = getTargetCardRect();
      const c = easeInOutQuart(cardPhase);

      const currentX = lerp(startX, target.x, c);
      const currentY = lerp(startY, target.y, c);
      const currentW = lerp(startW, target.w, c);
      const currentH = lerp(startH, target.h, c);

      landingCard.style.left = `${currentX}px`;
      landingCard.style.top = `${currentY}px`;
      landingCard.style.width = `${currentW}px`;
      landingCard.style.height = `${currentH}px`;
      landingCard.style.borderRadius = `0px`;

      landingCardSheen.style.opacity = `${lerp(0.18, 0.0, c)}`;
      landingCard.style.opacity = `${1 - endFade}`;

      // 메인은 90% 전까지 안 보이게
      if (t < 0.90) {
        mainStage.style.opacity = "0";
      } else {
        mainStage.style.opacity = `${easeOutCubic(mainPhase)}`;
      }

      // 처음엔 검정, 스크롤 시작 후엔 흰색으로 유지, 마지막에만 숨김
      hint.style.opacity = t > 0.88 ? "0" : "1";

      const shouldUnlock = introFinished;
      if (shouldUnlock !== revealUnlocked) {
        revealUnlocked = shouldUnlock;
        mainStage.style.pointerEvents = revealUnlocked ? "auto" : "none";
      }

      if (t >= 0.999) {
        introFinished = true;
        revealUnlocked = true;
        mainStage.style.pointerEvents = "auto";
        mainStage.style.opacity = "1";

        if (landingStage) landingStage.remove();
        hint.style.display = "none";
      }
    }

    function updateMouseFollow() {
      if (!svgRoot || !mouseLayer) return;
      if (!revealUnlocked) return;
      if (fitScale === 0) return;

      const targetSvgX = (mouseX - fitX) / fitScale;
      const tx = targetSvgX - mouseCenterLocalX;
      const ty = mouseBaseY;

      mouseLayer.setAttribute("transform", `translate(${tx} ${ty})`);
      mouseLayer.style.mixBlendMode = "screen";
    }

    function applyMode(nextMode) {
      mode = nextMode;

      if (mode === 1) {
        show(bgw, true);
        show(text1, true);
        show(mouseLayer, true);
        show(shadow, true);

        show(bgb, false);
        show(text2, false);

        setTextColor(bridgeText, "#111111");
        setTextColor(unquotedText, "#111111");

        if (cover1Dom) cover1Dom.style.display = "block";
        if (cover2Dom) cover2Dom.style.display = "none";

        reorderSVG([
          bgw,
          text1,
          mouseLayer,
          shadow,
          unquotedText,
          bridgeText
        ]);

        if (cover1Dom) coverWrap.appendChild(cover1Dom);
      }

      if (mode === 2) {
        show(bgb, true);
        show(mouseLayer, true);
        show(text2, true);
        show(shadow, true);

        show(bgw, false);
        show(text1, false);

        /* 아까 보이던 버전처럼 */
        setTextColor(bridgeText, "#ffffff");
        setTextColor(unquotedText, "#ffffff");

        if (cover1Dom) cover1Dom.style.display = "none";
        if (cover2Dom) cover2Dom.style.display = "block";

        reorderSVG([
          bgb,
          mouseLayer,
          text2,
          shadow,
          unquotedText,
          bridgeText
        ]);

        if (cover2Dom) coverWrap.appendChild(cover2Dom);
      }
    }

    function reorderSVG(list) {
      list.forEach(el => {
        if (el && el.parentNode) el.parentNode.appendChild(el);
      });
    }

    function show(el, visible) {
      if (!el) return;
      el.style.display = visible ? "block" : "none";
      el.style.visibility = visible ? "visible" : "hidden";
      el.setAttribute("display", visible ? "inline" : "none");
    }

    function setTextColor(textEl, color) {
      if (!textEl) return;

      textEl.setAttribute("fill", color);
      textEl.style.fill = color;

      const tspans = textEl.querySelectorAll("tspan");
      tspans.forEach(t => {
        t.setAttribute("fill", color);
        t.style.fill = color;
      });
    }

    function onResize() {
      applyUnifiedFit();
      if (!introFinished) updateIntroAnimation();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutQuart(t) {
      return t < 0.5
        ? 8 * t * t * t * t
        : 1 - Math.pow(-2 * t + 2, 4) / 2;
    }
  </script>
</body>
</html>
