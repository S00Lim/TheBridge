<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>the bridge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #svgWrap,
    #coverWrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #svgWrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .cover {
      position: absolute;
      display: block;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
      object-fit: fill;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="svgWrap"></div>
    <div id="coverWrap"></div>
  </div>

  <script>
    let svgRoot;
    let mode = 1;

    let bgw, bgb, text1, text2, mouseLayer, shadow;
    let cover1Placeholder, cover2Placeholder;
    let bridgeText, unquotedText;

    const VIEW_W = 1920;
    const VIEW_H = 1086.2646;

    let fitScale = 1;
    let fitX = 0;
    let fitY = 0;

    let coverWrap;
    let cover1Dom, cover2Dom;

    let coverRect = {
      x: 664.3654,
      y: 127.2975,
      w: 588.1724,
      h: 825.4051
    };

    let mouseBaseX = 0;
    let mouseBaseY = 0;
    let mouseCenterLocalX = 0;

    function setup() {
      noCanvas();
      coverWrap = document.getElementById("coverWrap");
      loadSVG();
    }

    function draw() {
      if (!svgRoot || !mouseLayer) return;
      if (fitScale === 0) return;

      const targetSvgX = (mouseX - fitX) / fitScale;
      const tx = targetSvgX - mouseCenterLocalX;
      const ty = mouseBaseY;

      mouseLayer.setAttribute("transform", `translate(${tx} ${ty})`);
      mouseLayer.style.mixBlendMode = "screen";
    }

    async function loadSVG() {
      try {
        const res = await fetch("web02.svg");
        const svgText = await res.text();

        document.getElementById("svgWrap").innerHTML = svgText;
        svgRoot = document.querySelector("#svgWrap svg");

        if (!svgRoot) {
          console.error("SVG not found");
          return;
        }

        // 화면 꽉 차게
        svgRoot.setAttribute("preserveAspectRatio", "xMidYMid slice");

        bindSVGElements();
        detectCoverRect();
        detectMouseGeometry();
        buildCoverImages();
        applyFit();
        applyMode(1);
      } catch (err) {
        console.error("SVG load failed:", err);
      }
    }

    function bindSVGElements() {
      bgw = svgRoot.getElementById("bgw");
      bgb = svgRoot.getElementById("bgb");
      text1 = svgRoot.getElementById("text1");
      text2 = svgRoot.getElementById("text2");
      mouseLayer = svgRoot.getElementById("mouse");
      shadow = svgRoot.getElementById("shadow");
      cover1Placeholder = svgRoot.getElementById("cover1");
      cover2Placeholder = svgRoot.getElementById("cover2");

      if (mouseLayer) {
        mouseLayer.style.mixBlendMode = "screen";
        mouseLayer.style.pointerEvents = "none";
      }

      const allTexts = [...svgRoot.querySelectorAll("text")];

      bridgeText = allTexts.find(t => {
        const txt = (t.textContent || "").trim().toLowerCase();
        return txt.includes("the bridge");
      });

      unquotedText = allTexts.find(t => {
        const txt = (t.textContent || "").trim().toLowerCase();
        return txt.includes("unquoted");
      });

      if (cover1Placeholder) cover1Placeholder.style.display = "none";
      if (cover2Placeholder) cover2Placeholder.style.display = "none";
    }

    function detectCoverRect() {
      let rectNode = null;

      if (cover1Placeholder) rectNode = cover1Placeholder.querySelector("rect");
      if (!rectNode && cover2Placeholder) rectNode = cover2Placeholder.querySelector("rect");

      if (rectNode) {
        coverRect.x = parseFloat(rectNode.getAttribute("x")) || coverRect.x;
        coverRect.y = parseFloat(rectNode.getAttribute("y")) || coverRect.y;
        coverRect.w = parseFloat(rectNode.getAttribute("width")) || coverRect.w;
        coverRect.h = parseFloat(rectNode.getAttribute("height")) || coverRect.h;
      }
    }

    function detectMouseGeometry() {
      if (!mouseLayer) return;

      const img = mouseLayer.querySelector("image");
      if (!img) return;

      const tr = img.getAttribute("transform");
      if (tr) {
        const match = tr.match(/translate\(([-\d.]+)\s+([-\d.]+)\)/);
        if (match) {
          mouseBaseX = parseFloat(match[1]) || 0;
          mouseBaseY = parseFloat(match[2]) || 0;
        }
      }

      const imgW = parseFloat(img.getAttribute("width")) || 0;
      mouseCenterLocalX = mouseBaseX + imgW * 0.5;

      mouseLayer.setAttribute("transform", `translate(${mouseBaseX} ${mouseBaseY})`);
    }

    function buildCoverImages() {
      coverWrap.innerHTML = "";

      cover1Dom = document.createElement("img");
      cover1Dom.src = "cover1.png";
      cover1Dom.className = "cover";
      cover1Dom.id = "cover1-dom";
      cover1Dom.alt = "cover1";
      cover1Dom.addEventListener("click", () => {
        if (mode === 1) applyMode(2);
      });

      cover2Dom = document.createElement("img");
      cover2Dom.src = "cover2.png";
      cover2Dom.className = "cover";
      cover2Dom.id = "cover2-dom";
      cover2Dom.alt = "cover2";
      cover2Dom.addEventListener("click", () => {
        if (mode === 2) applyMode(1);
      });

      coverWrap.appendChild(cover1Dom);
      coverWrap.appendChild(cover2Dom);
    }

    function applyFit() {
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      // contain 말고 cover
      fitScale = Math.max(sw / VIEW_W, sh / VIEW_H);
      fitX = (sw - VIEW_W * fitScale) * 0.5;
      fitY = (sh - VIEW_H * fitScale) * 0.5;

      positionCover(cover1Dom);
      positionCover(cover2Dom);
    }

    function positionCover(el) {
      if (!el) return;

      el.style.left = `${fitX + coverRect.x * fitScale}px`;
      el.style.top = `${fitY + coverRect.y * fitScale}px`;
      el.style.width = `${coverRect.w * fitScale}px`;
      el.style.height = `${coverRect.h * fitScale}px`;
    }

    function applyMode(nextMode) {
      mode = nextMode;

      if (mode === 1) {
        show(bgw, true);
        show(text1, true);
        show(mouseLayer, true);
        show(shadow, true);

        show(bgb, false);
        show(text2, false);

        setTextColor(bridgeText, "#111111");
        setTextColor(unquotedText, "#111111");

        if (cover1Dom) cover1Dom.style.display = "block";
        if (cover2Dom) cover2Dom.style.display = "none";

        reorderSVG([
          bgw,
          text1,
          mouseLayer,
          shadow,
          unquotedText,
          bridgeText
        ]);

        if (cover1Dom) coverWrap.appendChild(cover1Dom);
      }

      if (mode === 2) {
        show(bgb, true);
        show(mouseLayer, true);
        show(text2, true);
        show(shadow, true);

        show(bgw, false);
        show(text1, false);

        setTextColor(bridgeText, "#ffffff");
        setTextColor(unquotedText, "#ffffff");

        if (cover1Dom) cover1Dom.style.display = "none";
        if (cover2Dom) cover2Dom.style.display = "block";

        reorderSVG([
          bgb,
          mouseLayer,
          text2,
          shadow,
          unquotedText,
          bridgeText
        ]);

        if (cover2Dom) coverWrap.appendChild(cover2Dom);
      }
    }

    function reorderSVG(list) {
      list.forEach(el => {
        if (el && el.parentNode) {
          el.parentNode.appendChild(el);
        }
      });
    }

    function show(el, visible) {
      if (!el) return;
      el.style.display = visible ? "block" : "none";
      el.style.visibility = visible ? "visible" : "hidden";
      el.setAttribute("display", visible ? "inline" : "none");
    }

    function setTextColor(textEl, color) {
      if (!textEl) return;

      textEl.setAttribute("fill", color);
      textEl.style.fill = color;

      const tspans = textEl.querySelectorAll("tspan");
      tspans.forEach(t => {
        t.setAttribute("fill", color);
        t.style.fill = color;
      });
    }

    function windowResized() {
      applyFit();
    }
  </script>
</body>
</html>
